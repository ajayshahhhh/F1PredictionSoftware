<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 · Race Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg0: #06080d;
  --bg1: #0a0f18;
  --bg2: #0f1620;
  --bg3: #141d2a;
  --line: #1a2535;
  --line2: #243346;
  --text: #dce8f5;
  --muted: #4a6680;
  --dim: #2a3d52;
  --red: #e8001a;
  --amber: #f5a623;
  --green: #00e676;
  --cyan: #00d4ff;
  --hud: 'Orbitron', monospace;
  --mono: 'JetBrains Mono', monospace;
  --body: 'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg0); color: var(--text); font-family: var(--body); }

/* ── SCAN LINE TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ── LAYOUT ── */
#app {
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 220px 1fr 300px;
  height: 100vh;
}

/* ── TOPBAR ── */
#topbar {
  grid-column: 1 / -1;
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 20px; padding: 0 24px;
  position: relative;
}

#topbar::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.4;
}

.logo {
  font-family: var(--hud);
  font-size: 11px; font-weight: 700; letter-spacing: 4px;
  color: var(--red);
}
.logo span { color: var(--muted); font-weight: 400; }

.controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }

select {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg2); border: 1px solid var(--line2);
  color: var(--text); padding: 6px 10px; border-radius: 3px; cursor: pointer;
  appearance: none; min-width: 140px;
}
select:focus { outline: none; border-color: var(--red); }

.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
  padding: 6px 16px; border-radius: 3px; cursor: pointer; border: 1px solid;
  transition: all 0.15s;
}
.btn-primary { background: var(--red); border-color: var(--red); color: #fff; }
.btn-primary:hover { background: #c50017; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost { background: transparent; border-color: var(--line2); color: var(--muted); }
.btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.live { background: var(--green); animation: pulse 1.5s infinite; }
.dot.loading { background: var(--amber); animation: blink 0.6s infinite; }

#lap-counter {
  font-family: var(--hud); font-size: 12px; color: var(--cyan);
  letter-spacing: 2px; min-width: 80px; text-align: center;
}

/* ── LEFT PANEL: driver list ── */
#left {
  background: var(--bg1); border-right: 1px solid var(--line);
  overflow-y: auto; padding: 12px 0;
}

.panel-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted);
  padding: 0 16px 10px; text-transform: uppercase;
}

.driver-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  position: relative;
}
.driver-row:hover { background: rgba(255,255,255,0.025); }
.driver-row.active { background: var(--bg3); border-left-color: var(--driver-color, var(--red)); }

.dr-swatch { width: 8px; height: 8px; border-radius: 50%; background: var(--driver-color, var(--muted)); flex-shrink: 0; }
.dr-info { flex: 1; min-width: 0; }
.dr-code { font-family: var(--hud); font-size: 11px; font-weight: 700; }
.dr-name { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dr-prob {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--driver-color, var(--green));
  min-width: 38px; text-align: right;
}

.dr-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: var(--driver-color, transparent); opacity: 0.2;
  transition: opacity 0.3s;
}
.driver-row.active .dr-bar { opacity: 0.6; }

/* ── CENTER PANEL ── */
#center {
  display: flex; flex-direction: column; overflow: hidden;
}

/* Track area */
#track-area {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #0d1a26 0%, var(--bg0) 70%);
}

#track-svg-wrap {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
}

#track-svg-wrap svg {
  max-width: 90%; max-height: 90%;
  filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.06));
}

/* SVG track styles */
.track-outline { fill: none; stroke: var(--line2); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
.track-inner   { fill: none; stroke: var(--bg1);   stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
.track-center  { fill: none; stroke: #1e3045;       stroke-width: 1;  stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 8; }

.corner-dot {
  cursor: pointer; transition: r 0.15s, opacity 0.15s;
  filter: drop-shadow(0 0 4px var(--c-color));
}
.corner-dot:hover { r: 9; }
.corner-dot.active { r: 10; animation: corner-pulse 1s infinite; }
.corner-label {
  font-family: var(--hud); font-size: 8px; font-weight: 600;
  fill: var(--muted); cursor: pointer; pointer-events: none;
  transition: fill 0.15s;
}
.corner-label.active { fill: var(--cyan); }

@keyframes corner-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Impactful corner badge */
#impact-badge {
  position: absolute; top: 14px; left: 16px;
  background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.35);
  border-radius: 4px; padding: 6px 12px;
  font-family: var(--mono); font-size: 10px; color: var(--amber);
  display: none;
}
#impact-badge b { font-size: 13px; font-family: var(--hud); }

/* Lap scrubber */
#scrubber {
  background: var(--bg1); border-top: 1px solid var(--line);
  padding: 10px 20px; display: flex; align-items: center; gap: 14px;
}

#play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--line2);
  color: var(--text); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
#play-btn:hover { border-color: var(--cyan); background: var(--bg2); }
#play-btn.playing { border-color: var(--red); }

#lap-slider {
  flex: 1; -webkit-appearance: none; height: 3px;
  background: var(--line); border-radius: 2px; outline: none;
}
#lap-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--cyan);
  cursor: pointer; box-shadow: 0 0 8px rgba(0,212,255,0.4);
}

/* ── CORNER INSPECTOR OVERLAY ── */
#corner-inspector {
  position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%);
  background: rgba(10,15,24,0.96); border: 1px solid var(--line2);
  border-radius: 6px; padding: 14px 18px; min-width: 340px;
  display: none; backdrop-filter: blur(8px);
}
#corner-inspector.show { display: block; animation: fadeUp 0.2s ease-out; }

@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.ci-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ci-title { font-family: var(--hud); font-size: 14px; font-weight: 700; color: var(--cyan); }
.ci-lap { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.ci-close { font-size: 14px; cursor: pointer; color: var(--muted); background: none; border: none; }
.ci-close:hover { color: var(--text); }

.ci-winner-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border-radius: 4px; padding: 10px 12px; margin-bottom: 12px;
  border-left: 3px solid var(--winner-color, var(--cyan));
}
.ci-winner-code { font-family: var(--hud); font-size: 18px; font-weight: 900; color: var(--winner-color, var(--cyan)); }
.ci-winner-name { font-size: 11px; color: var(--muted); }
.ci-winner-label { font-family: var(--mono); font-size: 9px; color: var(--amber); letter-spacing: 1px; }

.ci-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.ci-stat { text-align: center; }
.ci-stat-val { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.ci-stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

/* ── RIGHT PANEL ── */
#right {
  background: var(--bg1); border-left: 1px solid var(--line);
  overflow-y: auto; display: flex; flex-direction: column;
}

.right-section { padding: 16px; border-bottom: 1px solid var(--line); }
.right-section:last-child { border-bottom: none; flex: 1; }

.section-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }

/* Win prob chart */
#chart-win-prob { max-height: 160px; }

/* Position tracker */
.pos-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid rgba(26,37,53,0.5);
  transition: all 0.3s;
}
.pos-num {
  font-family: var(--hud); font-size: 11px; width: 20px; text-align: center;
  color: var(--muted);
}
.pos-num.p1 { color: #ffd700; }
.pos-num.p2 { color: #c0c8d8; }
.pos-num.p3 { color: #cd7f32; }
.pos-name { font-size: 11px; flex: 1; }
.pos-code { font-family: var(--hud); font-size: 9px; color: var(--muted); width: 30px; }
.pos-bar-wrap { width: 60px; }
.pos-bar { height: 2px; border-radius: 1px; background: var(--dim); overflow: hidden; }
.pos-bar-fill { height: 100%; border-radius: 1px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.pos-pct { font-family: var(--mono); font-size: 10px; width: 38px; text-align: right; }

/* Driver detail (right panel, when driver selected) */
#driver-detail-panel { padding: 16px; }

.dd-header { margin-bottom: 14px; }
.dd-code { font-family: var(--hud); font-size: 28px; font-weight: 900; line-height: 1; }
.dd-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
.dd-team { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }

.dd-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.dd-stat { background: var(--bg2); border-radius: 4px; padding: 8px 10px; }
.dd-stat-val { font-family: var(--hud); font-size: 15px; font-weight: 700; }
.dd-stat-label { font-size: 8px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

.chart-small { max-height: 100px; margin-bottom: 10px; }

/* ── LOADING / PLACEHOLDER ── */
#loading-overlay {
  position: fixed; inset: 0; background: rgba(6,8,13,0.9);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  z-index: 1000;
}
#loading-overlay.show { display: flex; }
.loading-text { font-family: var(--hud); font-size: 11px; letter-spacing: 3px; color: var(--red); animation: blink 0.8s infinite; }
.loading-track { width: 260px; height: 2px; background: var(--line); border-radius: 1px; overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--amber)); animation: loading-sweep 1.4s ease-in-out infinite; }

#placeholder {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; height: 100%;
  color: var(--muted); text-align: center;
}
.ph-icon { font-size: 36px; opacity: 0.2; }
.ph-text { font-family: var(--hud); font-size: 11px; letter-spacing: 2px; }

@keyframes pulse   { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
@keyframes blink   { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
@keyframes loading-sweep {
  0%   { width:0%;  margin-left:0%; }
  50%  { width:55%; margin-left:22%; }
  100% { width:0%;  margin-left:100%; }
}
@keyframes fadeIn  { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }

.fade-in { animation: fadeIn 0.3s ease-out; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-text" id="loading-text">INITIALIZING</div>

  </div>
  <div id="loading-msg" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;max-width:340px;text-align:center"></div>

</div>

<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="logo">F1 <span>RACE INTELLIGENCE</span></div>
    <div class="controls">
      <select id="sel-year">
        <option value="2026">2026</option>
        <option value="2025">2025</option>

      <select id="sel-circuit">
        <option value="Australia">AUSTRALIA GP</option>
        <option value="China">CHINA GP</option>
        <option value="Bahrain">BAHRAIN GP</option>
        <option value="Japan">JAPAN GP</option>
      </select>
      <div class="dot" id="status-dot"></div>
      <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">ANALYZE</button>
    </div>

  </div>

  <!-- LEFT: driver list -->
  <div id="left">
    <div class="panel-label">DRIVERS</div>
    <div id="driver-list">
      <div id="placeholder" style="height:200px">
        <div class="ph-icon">🏎</div>

  <!-- CENTER -->

      <div id="corner-inspector">
        <div class="ci-header">

          <button class="ci-close" onclick="closeInspector()">✕</button>
        </div>
        <div class="ci-winner-row" id="ci-winner-row">
          <div>
            <div class="ci-winner-code" id="ci-winner-code">—</div>
            <div class="ci-winner-name" id="ci-winner-name">—</div>
            <div class="ci-winner-label">BEST EXECUTION THIS LAP</div>
          </div>
        </div>
        <div class="ci-stats">
          <div class="ci-stat">
            <div class="ci-stat-val" id="ci-speed" style="color:var(--cyan)">—</div>
            <div class="ci-stat-label">KM/H</div>
          </div>
          <div class="ci-stat">
            <div class="ci-stat-val" id="ci-throttle" style="color:var(--green)">—</div>
            <div class="ci-stat-label">THROTTLE</div>
          </div>
          <div class="ci-stat">
            <div class="ci-stat-val" id="ci-brake" style="color:var(--amber)">—</div>
            <div class="ci-stat-label">BRAKE</div>
          </div>
        </div>
      </div>
    </div>

    <div id="scrubber">
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <input type="range" id="lap-slider" min="0" max="0" value="0" oninput="onScrub(this.value)">
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted);min-width:60px" id="lap-label">LAP — / —</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="right-section">
      <div class="section-title">WIN PROBABILITY</div>
      <canvas id="chart-win-prob"></canvas>
    </div>
    <div class="right-section" id="rankings-section">
      <div class="section-title">STANDINGS</div>
      <div id="rankings-list"></div>
    </div>
    <div id="driver-detail-panel" style="display:none"></div>
  </div>

</div>

// ── ANALYZE ────────────────────────────────────────────────────────────────
async function analyze() {
  const year    = document.getElementById('sel-year').value;
  const circuit = document.getElementById('sel-circuit').value;
  const btn     = document.getElementById('analyze-btn');
  const dot     = document.getElementById('status-dot');

  btn.disabled = true;
  dot.className = 'dot loading';
  document.getElementById('loading-overlay').classList.add('show');
  setLoadingProgress(0, 'CONNECTING TO OPENF1...');

  // Start SSE progress stream
  let evtSource = null;
  try {
    evtSource = new EventSource('/api/progress');
    evtSource.onmessage = (e) => {
      const d = JSON.parse(e.data);
      setLoadingProgress(d.pct, d.message);
      if (d.status === 'done') { evtSource.close(); evtSource = null; }
    };
    evtSource.onerror = () => { if (evtSource) { evtSource.close(); evtSource = null; } };
  } catch(e) { /* SSE not critical */ }

  try {
    const res = await fetch(`/api/analyze?year=${year}&circuit=${circuit}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    G = await res.json();
    currentLap = 0;
    selectedCorner = null;
    selectedDriver = null;
    setLoadingProgress(100, 'DONE');
    initUI();
    dot.className = 'dot live';
  } catch(e) {
    console.error(e);
    dot.className = 'dot';
    alert('Analysis failed — is Flask running?\n' + e.message);
  } finally {
    if (evtSource) { evtSource.close(); }
    btn.disabled = false;
    document.getElementById('loading-overlay').classList.remove('show');
  }
}

function setLoadingProgress(pct, msg) {
  const fill = document.getElementById('loading-fill');
  const msgEl = document.getElementById('loading-msg');
  const txt = document.getElementById('loading-text');
  if (fill)  fill.style.width = pct + '%';
  if (msgEl) msgEl.textContent = msg.toUpperCase();
  if (txt)   txt.textContent = pct < 100 ? `LOADING  ${pct}%` : 'COMPLETE';
}

// ── INIT UI ────────────────────────────────────────────────────────────────
function initUI() {
  renderDriverList();
  renderTrack();
  setupScrubber();
  renderWinProbChart();
  renderRankings();
  setLap(0);
  showImpactBadge();
}

function showImpactBadge() {
  const b = document.getElementById('impact-badge');
  b.style.display = 'block';
  b.innerHTML = `⚡ HIGHEST IMPACT CORNER: <b>${G.most_impactful_corner}</b>`;
}

// ── DRIVER LIST ────────────────────────────────────────────────────────────
function renderDriverList() {
  const list = document.getElementById('driver-list');
  list.innerHTML = '';
  G.final_ranking.forEach(r => {
    const d = G.drivers[r.driver];
    const pct = (r.win_probability * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'driver-row';
    row.id = `dr-${r.driver}`;
    row.style.setProperty('--driver-color', d.color);
    row.onclick = () => selectDriver(r.driver);
    row.innerHTML = `
      <div class="dr-swatch"></div>
      <div class="dr-info">
        <div class="dr-code">${r.driver}</div>
        <div class="dr-name">${d.name}</div>
      </div>
      <div class="dr-prob" id="prob-${r.driver}">${pct}%</div>
      <div class="dr-bar"></div>
    `;
    list.appendChild(row);
  });
}

// ── TRACK SVG ──────────────────────────────────────────────────────────────
function renderTrack() {
  const wrap = document.getElementById('track-svg-wrap');
  wrap.innerHTML = AUSTRALIA_SVG;

  const svg = wrap.querySelector('svg');
  const markersGroup = svg.getElementById('corner-markers');

  G.corners.forEach(cn => {
    const pos = CORNER_POSITIONS[cn];
    if (!pos) return;

    const isImpact = cn === G.most_impactful_corner;
    const color = isImpact ? '#f5a623' : '#1e4060';

    // Dot
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pos.x); circle.setAttribute('cy', pos.y);
    circle.setAttribute('r', 6);
    circle.setAttribute('fill', color);
    circle.setAttribute('class', 'corner-dot');
    circle.setAttribute('id', `cdot-${cn}`);
    circle.style.setProperty('--c-color', color);
    circle.addEventListener('click', () => selectCorner(cn));

    // Label
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', pos.x + pos.dx); text.setAttribute('y', pos.y + pos.dy);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('class', 'corner-label');
    text.setAttribute('id', `clabel-${cn}`);
    text.textContent = cn;

    markersGroup.appendChild(circle);
    markersGroup.appendChild(text);
  });
}

// ── SCRUBBER ───────────────────────────────────────────────────────────────
function setupScrubber() {
  const slider = document.getElementById('lap-slider');
  const maxLap = G.bayesian_timeline.length - 1;
  slider.max = maxLap;
  slider.value = 0;
}

function onScrub(val) {
  if (playInterval) stopPlay();
  setLap(parseInt(val));
}

function togglePlay() {
  if (playInterval) stopPlay();
  else startPlay();
}

function startPlay() {
  const btn = document.getElementById('play-btn');
  btn.textContent = '⏸'; btn.classList.add('playing');
  const maxLap = G.bayesian_timeline.length - 1;
  if (currentLap >= maxLap) setLap(0);
  playInterval = setInterval(() => {
    if (currentLap >= maxLap) { stopPlay(); return; }
    setLap(currentLap + 1);
  }, 600);
}

function stopPlay() {
  clearInterval(playInterval); playInterval = null;
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶'; btn.classList.remove('playing');
}

function setLap(lapIdx) {
  currentLap = lapIdx;
  document.getElementById('lap-slider').value = lapIdx;
  const snap = G.bayesian_timeline[lapIdx];
  const maxLap = G.bayesian_timeline.length;
  document.getElementById('lap-counter').textContent = `LAP ${snap.lap}`;
  document.getElementById('lap-label').textContent = `LAP ${snap.lap} / ${maxLap}`;

  updateDriverProbs(snap);
  updateRankings(snap);
  updateWinProbChart(lapIdx);
  updateCornerDots(lapIdx);
  if (selectedCorner) updateInspector(selectedCorner, lapIdx);
  if (selectedDriver) updateDriverDetail(selectedDriver);
}

// ── UPDATE DRIVER PROBS (left panel) ──────────────────────────────────────
function updateDriverProbs(snap) {
  Object.keys(G.drivers).forEach(code => {
    const el = document.getElementById(`prob-${code}`);
    if (el) el.textContent = ((snap[code] || 0) * 100).toFixed(1) + '%';
  });
}

// ── CORNER DOTS ───────────────────────────────────────────────────────────
function updateCornerDots(lapIdx) {
  // Color corner dots by who wins them at this lap
  G.corners.forEach(cn => {
    const dot = document.getElementById(`cdot-${cn}`);
    if (!dot) return;
    const winner = cornerWinnerAtLap(cn, lapIdx);
    const color = winner ? G.drivers[winner].color : '#1e4060';
    dot.setAttribute('fill', color);
    dot.style.setProperty('--c-color', color);
  });
}

function cornerWinnerAtLap(cn, lapIdx) {
  // Find driver with best corner execution score at this lap index
  let best = null, bestScore = -Infinity;
  Object.entries(G.drivers).forEach(([code, d]) => {
    if (lapIdx < d.laps.length) {
      const lap = d.laps[lapIdx];
      const c = lap.corners.find(x => x.corner === cn);
      if (c && c.score > bestScore) { bestScore = c.score; best = code; }
    }
  });
  return best;
}

// ── CORNER INSPECTOR ──────────────────────────────────────────────────────
function selectCorner(cn) {
  if (selectedCorner) {
    const old = document.getElementById(`cdot-${selectedCorner}`);
    const oldL = document.getElementById(`clabel-${selectedCorner}`);
    if (old) old.classList.remove('active');
    if (oldL) oldL.classList.remove('active');
  }
  selectedCorner = cn;
  const dot = document.getElementById(`cdot-${cn}`);
  const lbl = document.getElementById(`clabel-${cn}`);
  if (dot) dot.classList.add('active');
  if (lbl) lbl.classList.add('active');
  updateInspector(cn, currentLap);
  document.getElementById('corner-inspector').classList.add('show');
}

function updateInspector(cn, lapIdx) {
  document.getElementById('ci-title').textContent = cn;
  const snap = G.bayesian_timeline[lapIdx];
  document.getElementById('ci-lap').textContent = `LAP ${snap.lap}`;

  const winner = cornerWinnerAtLap(cn, lapIdx);
  if (!winner) return;
  const d = G.drivers[winner];
  const lap = d.laps[lapIdx];
  const c = lap ? lap.corners.find(x => x.corner === cn) : null;

  const wr = document.getElementById('ci-winner-row');
  wr.style.setProperty('--winner-color', d.color);
  document.getElementById('ci-winner-code').textContent = winner;
  document.getElementById('ci-winner-code').style.color = d.color;
  document.getElementById('ci-winner-name').textContent = d.name;

  if (c) {
    document.getElementById('ci-speed').textContent    = c.speed.toFixed(0);
    document.getElementById('ci-throttle').textContent = (c.throttle * 100).toFixed(0) + '%';
    document.getElementById('ci-brake').textContent    = (c.brake * 100).toFixed(0) + '%';
  }
}

function closeInspector() {
  document.getElementById('corner-inspector').classList.remove('show');
  selectedCorner = null;
  G.corners.forEach(cn => {
    const el = document.getElementById(`clabel-${cn}`);
    if (el) el.classList.remove('active');
  });
}

// ── WIN PROB CHART ─────────────────────────────────────────────────────────
function renderWinProbChart() {
  const ctx = document.getElementById('chart-win-prob').getContext('2d');
  if (winProbChart) winProbChart.destroy();

  const timeline = G.bayesian_timeline;
  const labels = timeline.map(t => `L${t.lap}`);
  const topDrivers = G.final_ranking.slice(0, 6);

  winProbChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: topDrivers.map(r => ({
        label: r.driver,
        data: timeline.map(t => ((t[r.driver] || 0) * 100).toFixed(1)),
        borderColor: G.drivers[r.driver].color,
        backgroundColor: 'transparent',
        borderWidth: 1.5, pointRadius: 0, tension: 0.4,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      animation: false,
      plugins: {
        legend: { display: true, labels: { color: '#4a6680', font: { family: 'JetBrains Mono', size: 8 }, boxWidth: 8, padding: 8 } },
        tooltip: { backgroundColor: '#0a0f18', borderColor: '#1a2535', borderWidth: 1,
          titleFont: { family: 'JetBrains Mono', size: 9 }, bodyFont: { family: 'JetBrains Mono', size: 9 },
          titleColor: '#dce8f5', bodyColor: '#4a6680' }
      },
      scales: {
        x: { ticks: { color: '#4a6680', font: { family: 'JetBrains Mono', size: 8 }, maxTicksLimit: 6 }, grid: { color: '#1a2535' } },
        y: { ticks: { color: '#4a6680', font: { family: 'JetBrains Mono', size: 8 }, callback: v => v + '%' }, grid: { color: '#1a2535' }, min: 0 }
      }
    }
  });
}

// Draw a vertical line at current lap
function updateWinProbChart(lapIdx) {
  if (!winProbChart) return;
  // Highlight current lap point via annotation-free approach: just keep chart static
  // (full re-render would be too slow; chart already shows full trajectory)
}

// ── RANKINGS ──────────────────────────────────────────────────────────────
function renderRankings() {
  updateRankings(G.bayesian_timeline[0]);
}

function updateRankings(snap) {
  const list = document.getElementById('rankings-list');
  const sorted = Object.keys(G.drivers)
    .map(d => ({code: d, prob: snap[d] || 0}))
    .sort((a,b) => b.prob - a.prob);

  const maxProb = sorted[0].prob || 1;

  list.innerHTML = '';
  sorted.forEach((r, idx) => {
    const d = G.drivers[r.code];
    const pct = (r.prob * 100).toFixed(1);
    const posClass = idx === 0 ? 'p1' : idx === 1 ? 'p2' : idx === 2 ? 'p3' : '';
    const barW = ((r.prob / maxProb) * 100).toFixed(1);

    const row = document.createElement('div');
    row.className = 'pos-row';
    row.style.cursor = 'pointer';
    row.onclick = () => selectDriver(r.code);
    row.innerHTML = `
      <div class="pos-num ${posClass}">${idx+1}</div>
      <div class="dr-swatch" style="--driver-color:${d.color};background:${d.color}"></div>
      <div class="pos-name" style="font-size:10px">${r.code}</div>
      <div class="pos-bar-wrap"><div class="pos-bar"><div class="pos-bar-fill" style="width:${barW}%;background:${d.color}"></div></div></div>
      <div class="pos-pct" style="color:${d.color}">${pct}%</div>
    `;
    list.appendChild(row);
  });
}

// ── DRIVER DETAIL ──────────────────────────────────────────────────────────
function selectDriver(code) {
  selectedDriver = code;
  document.querySelectorAll('.driver-row').forEach(r => r.classList.remove('active'));
  const row = document.getElementById(`dr-${code}`);
  if (row) row.classList.add('active');

  const panel = document.getElementById('driver-detail-panel');
  const rankSec = document.getElementById('rankings-section');
  panel.style.display = 'block';
  rankSec.style.display = 'none';
  updateDriverDetail(code);
}

let lapTimeChart = null;
let cornerScoreChart = null;

function updateDriverDetail(code) {
  const d = G.drivers[code];
  const snap = G.bayesian_timeline[currentLap];
  const winProb = ((snap[code] || 0) * 100).toFixed(1);
  const lapData = d.laps[currentLap] || d.laps[0];
  const avgLaptime = (d.laps.reduce((s,l) => s + l.laptime, 0) / d.laps.length).toFixed(3);
  const cornerWins = G.corners.filter(cn => G.corner_winners[cn] === code).length;

  const panel = document.getElementById('driver-detail-panel');
  panel.className = 'fade-in';
  panel.innerHTML = `
    <div class="dd-header">
      <div class="dd-code" style="color:${d.color}">${code}</div>
      <div class="dd-name">${d.name}</div>
      <div class="dd-team">${d.team} · ${d.points_2025} PTS (2025)</div>
    </div>
    <div class="dd-stats">
      <div class="dd-stat">
        <div class="dd-stat-val" style="color:${d.color}">${winProb}%</div>
        <div class="dd-stat-label">WIN PROB</div>
      </div>
      <div class="dd-stat">
        <div class="dd-stat-val" style="color:var(--cyan)">${cornerWins}</div>
        <div class="dd-stat-label">CORNER WINS</div>
      </div>
      <div class="dd-stat">
        <div class="dd-stat-val" style="color:var(--green)">${avgLaptime}s</div>
        <div class="dd-stat-label">AVG LAP</div>
      </div>
      <div class="dd-stat">
        <div class="dd-stat-val" style="color:var(--amber)">${d.overall_score.toFixed(1)}</div>
        <div class="dd-stat-label">GS SCORE</div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">LAP TIME TREND</div>
    <canvas id="dd-laptime-chart" class="chart-small"></canvas>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin:10px 0 6px">CORNER EXECUTION</div>
    <canvas id="dd-corner-chart" class="chart-small"></canvas>
    <button class="btn btn-ghost" style="margin-top:12px;width:100%;font-size:10px" onclick="backToRankings()">← ALL DRIVERS</button>
  `;

  setTimeout(() => {
    // Lap time chart
    const ltCtx = document.getElementById('dd-laptime-chart');
    if (lapTimeChart) lapTimeChart.destroy();
    lapTimeChart = new Chart(ltCtx, {
      type: 'line',
      data: {
        labels: d.laps.map(l => `L${l.lap}`),
        datasets: [{
          data: d.laps.map(l => l.laptime),
          borderColor: d.color, backgroundColor: d.color + '18',
          fill: true, tension: 0.4, pointRadius: 2, borderWidth: 1.5,
        }]
      },
      options: miniChartOptions()
    });

    // Corner score chart
    const ccCtx = document.getElementById('dd-corner-chart');
    if (cornerScoreChart) cornerScoreChart.destroy();
    const ckeys = Object.keys(d.corner_means);
    cornerScoreChart = new Chart(ccCtx, {
      type: 'bar',
      data: {
        labels: ckeys,
        datasets: [{
          data: ckeys.map(c => d.corner_means[c]),
          backgroundColor: ckeys.map(c => G.corner_winners[c] === code ? d.color + 'cc' : d.color + '30'),
          borderColor: ckeys.map(c => G.corner_winners[c] === code ? d.color : 'transparent'),
          borderWidth: 1,
        }]
      },
      options: miniChartOptions()
    });
  }, 30);
}

function backToRankings() {
  selectedDriver = null;
  document.querySelectorAll('.driver-row').forEach(r => r.classList.remove('active'));
  document.getElementById('driver-detail-panel').style.display = 'none';
  document.getElementById('rankings-section').style.display = 'block';
}

function miniChartOptions() {
  return {
    responsive: true, maintainAspectRatio: true, animation: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#0a0f18', borderColor: '#1a2535', borderWidth: 1,
      titleFont: { family: 'JetBrains Mono', size: 8 },
      bodyFont:  { family: 'JetBrains Mono', size: 8 },
      titleColor: '#dce8f5', bodyColor: '#4a6680'
    }},
    scales: {
      x: { ticks: { color: '#4a6680', font: { family: 'JetBrains Mono', size: 7 }, maxTicksLimit: 6 }, grid: { color: '#1a2535' } },
      y: { ticks: { color: '#4a6680', font: { family: 'JetBrains Mono', size: 7 }, maxTicksLimit: 4 }, grid: { color: '#1a2535' } }
    }
  };
}
</script>
