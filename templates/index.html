<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>F1 · Race Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg0:#06080d; --bg1:#0a0f18; --bg2:#0f1620; --bg3:#141d2a;
  --line:#1a2535; --line2:#243346; --text:#dce8f5; --muted:#4a6680; --dim:#2a3d52;
  --red:#e8001a; --amber:#f5a623; --green:#00e676; --cyan:#00d4ff;
  --hud:'Orbitron',monospace; --mono:'JetBrains Mono',monospace; --body:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg0);color:var(--text);font-family:var(--body);}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}

#app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:220px 1fr 300px;height:100vh;}

/* TOPBAR */
#topbar{grid-column:1/-1;background:var(--bg1);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;padding:0 20px;position:relative;}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0.4;}
.logo{font-family:var(--hud);font-size:11px;font-weight:700;letter-spacing:4px;color:var(--red);}
.logo span{color:var(--muted);font-weight:400;}
.controls{display:flex;align-items:center;gap:8px;margin-left:auto;}
select{font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--line2);
  color:var(--text);padding:6px 10px;border-radius:3px;cursor:pointer;appearance:none;min-width:130px;}
select:focus{outline:none;border-color:var(--red);}
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:6px 14px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff;}
.btn-primary:hover{background:#c50017;}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{background:transparent;border-color:var(--line2);color:var(--muted);}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-toggle{background:var(--bg2);border-color:var(--line2);color:var(--muted);font-size:10px;padding:5px 12px;}
.btn-toggle.active{background:rgba(0,212,255,0.12);border-color:var(--cyan);color:var(--cyan);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.dot.live{background:var(--green);animation:pulse 1.5s infinite;}
.dot.loading{background:var(--amber);animation:blink .6s infinite;}
#lap-counter{font-family:var(--hud);font-size:12px;color:var(--cyan);letter-spacing:2px;min-width:70px;text-align:center;}

/* LEFT */
#left{background:var(--bg1);border-right:1px solid var(--line);overflow-y:auto;padding:12px 0;}
.panel-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);padding:0 16px 10px;text-transform:uppercase;}
.driver-row{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;
  border-left:2px solid transparent;transition:background .12s,border-color .12s;position:relative;}
.driver-row:hover{background:rgba(255,255,255,.025);}
.driver-row.active{background:var(--bg3);border-left-color:var(--driver-color,var(--red));}
.dr-swatch{width:8px;height:8px;border-radius:50%;background:var(--driver-color,var(--muted));flex-shrink:0;}
.dr-info{flex:1;min-width:0;}
.dr-code{font-family:var(--hud);font-size:11px;font-weight:700;}
.dr-name{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.dr-prob{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--driver-color,var(--green));min-width:38px;text-align:right;}
.dr-pos{font-family:var(--hud);font-size:9px;color:var(--muted);}

/* CENTER */
#center{display:flex;flex-direction:column;overflow:hidden;}
#track-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d1a26 0%,var(--bg0) 70%);}

#track-svg-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
#track-svg-wrap svg{max-width:88%;max-height:88%;filter:drop-shadow(0 0 30px rgba(0,212,255,.06));}

/* SVG styles */
.track-outline{fill:none;stroke:var(--line2);stroke-width:18;stroke-linecap:round;stroke-linejoin:round;}
.track-inner{fill:none;stroke:var(--bg1);stroke-width:14;stroke-linecap:round;stroke-linejoin:round;}
.track-center{fill:none;stroke:#1e3045;stroke-width:1;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:6 8;}
.corner-dot{cursor:pointer;transition:r .15s;filter:drop-shadow(0 0 4px var(--c-color,#1e4060));}
.corner-dot:hover{r:9;}
.corner-dot.active-corner{r:10;animation:corner-pulse 1s infinite;}
.corner-label{font-family:var(--hud);font-size:8px;font-weight:600;fill:var(--muted);pointer-events:none;}
.corner-label.active-corner{fill:var(--cyan);}

/* Impact badge */
#impact-badge{position:absolute;top:14px;left:16px;
  background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.35);
  border-radius:4px;padding:6px 12px;font-family:var(--mono);font-size:10px;color:var(--amber);display:none;}
#impact-badge b{font-size:13px;font-family:var(--hud);}

/* Corner inspector */
#corner-inspector{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);
  background:rgba(10,15,24,.96);border:1px solid var(--line2);border-radius:6px;
  padding:14px 18px;min-width:340px;display:none;backdrop-filter:blur(8px);}
#corner-inspector.show{display:block;animation:fadeUp .2s ease-out;}

/* Scrubber */
#scrubber{background:var(--bg1);border-top:1px solid var(--line);
  padding:10px 20px;display:flex;align-items:center;gap:14px;}
#play-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--line2);color:var(--text);cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;flex-shrink:0;}
#play-btn:hover{border-color:var(--cyan);background:var(--bg2);}
#play-btn.playing{border-color:var(--red);}
#lap-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--line);border-radius:2px;outline:none;}
#lap-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--cyan);cursor:pointer;box-shadow:0 0 8px rgba(0,212,255,.4);}

/* RIGHT */
#right{background:var(--bg1);border-left:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column;}
.right-section{padding:16px;border-bottom:1px solid var(--line);}
.section-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--line);}
#chart-win-prob{max-height:160px;}

/* Driver detail */
#driver-detail-panel{padding:16px;display:none;}
.dd-header{margin-bottom:14px;}
.dd-code{font-family:var(--hud);font-size:28px;font-weight:900;line-height:1;}
.dd-name{font-size:12px;color:var(--muted);margin-top:2px;}
.dd-team{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px;}
.dd-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dd-stat{background:var(--bg2);border-radius:4px;padding:8px 10px;}
.dd-stat-val{font-family:var(--hud);font-size:15px;font-weight:700;}
.dd-stat-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.chart-small{max-height:100px;margin-bottom:10px;}

/* Click prompt */
#driver-click-prompt{padding:28px 16px;text-align:center;}

/* Loading */
#loading-overlay{position:fixed;inset:0;background:rgba(6,8,13,.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:1000;}
#loading-overlay.show{display:flex;}
.loading-text{font-family:var(--hud);font-size:11px;letter-spacing:3px;color:var(--red);}
.loading-track{width:280px;height:2px;background:var(--line);border-radius:1px;overflow:hidden;}
#loading-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--amber));width:0%;transition:width .4s ease;}

/* Corner inspector internals */
.ci-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ci-title{font-family:var(--hud);font-size:14px;font-weight:700;color:var(--cyan);}
.ci-lap{font-family:var(--mono);font-size:10px;color:var(--muted);}
.ci-close{font-size:14px;cursor:pointer;color:var(--muted);background:none;border:none;}
.ci-close:hover{color:var(--text);}
.ci-winner-row{display:flex;align-items:center;gap:12px;background:var(--bg3);border-radius:4px;
  padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--winner-color,var(--cyan));}
.ci-winner-code{font-family:var(--hud);font-size:18px;font-weight:900;}
.ci-winner-name{font-size:11px;color:var(--muted);}
.ci-winner-label{font-family:var(--mono);font-size:9px;color:var(--amber);letter-spacing:1px;}
.ci-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.ci-stat{text-align:center;}
.ci-stat-val{font-family:var(--mono);font-size:16px;font-weight:500;}
.ci-stat-label{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes corner-pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.fade-in{animation:fadeIn .3s ease-out;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="loading-text" id="loading-text">INITIALIZING</div>
  <div class="loading-track"><div id="loading-fill"></div></div>
  <div id="loading-msg" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;max-width:340px;text-align:center"></div>
  <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:6px">FIRST LOAD: ~2 MIN · CACHED FOREVER AFTER</div>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">F1 <span>RACE INTELLIGENCE</span></div>
    <div class="controls">
      <select id="sel-year"><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option></select>
      <select id="sel-circuit">
        <option value="Australia">AUSTRALIA GP</option>
        <option value="China">CHINA GP</option>
        <option value="Bahrain">BAHRAIN GP</option>
        <option value="Japan">JAPAN GP</option>
      </select>
      <div class="dot" id="status-dot"></div>
      <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">ANALYZE</button>
    </div>
    <div id="lap-counter">—</div>
  </div>

  <!-- LEFT: driver list -->
  <div id="left">
    <div class="panel-label">DRIVERS</div>
    <div id="driver-list">
      <div style="padding:40px 16px;text-align:center;color:var(--muted)">
        <div style="font-family:var(--hud);font-size:10px;letter-spacing:2px">LOAD RACE DATA</div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="track-area">
      <div id="track-svg-wrap">
        <div style="text-align:center;color:var(--muted)">
          <div style="font-family:var(--hud);font-size:11px;letter-spacing:2px">SELECT CIRCUIT AND ANALYZE</div>
        </div>
      </div>

      <div id="impact-badge"></div>

      <!-- Corner inspector -->
      <div id="corner-inspector">
        <div class="ci-header">
          <div class="ci-title" id="ci-title">T1</div>
          <div class="ci-lap" id="ci-lap">LAP —</div>
          <button class="ci-close" onclick="closeInspector()">✕</button>
        </div>
        <div class="ci-winner-row" id="ci-winner-row">
          <div>
            <div class="ci-winner-code" id="ci-winner-code">—</div>
            <div class="ci-winner-name" id="ci-winner-name">—</div>
            <div class="ci-winner-label">BEST EXECUTION THIS LAP</div>
          </div>
        </div>
        <div class="ci-stats">
          <div class="ci-stat"><div class="ci-stat-val" id="ci-speed" style="color:var(--cyan)">—</div><div class="ci-stat-label">KM/H</div></div>
          <div class="ci-stat"><div class="ci-stat-val" id="ci-throttle" style="color:var(--green)">—</div><div class="ci-stat-label">THROTTLE</div></div>
          <div class="ci-stat"><div class="ci-stat-val" id="ci-brake" style="color:var(--amber)">—</div><div class="ci-stat-label">BRAKE</div></div>
        </div>
      </div>

    </div>

    <div id="scrubber">
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <input type="range" id="lap-slider" min="0" max="0" value="0" oninput="onScrub(this.value)">
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted);min-width:60px" id="lap-label">LAP — / —</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="right-section">
      <div class="section-title">WIN PROBABILITY</div>
      <canvas id="chart-win-prob"></canvas>
    </div>
    <div class="right-section">
      <div class="section-title">DRIVER DETAIL</div>
      <div id="driver-click-prompt">
        <div style="font-size:28px;opacity:.15;margin-bottom:10px">👆</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;line-height:1.8">
          CLICK ANY DRIVER<br>ON THE LEFT TO<br>INSPECT THEIR DATA
        </div>
      </div>
    </div>
    <div id="driver-detail-panel"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let G = null;
let currentLap = 0;
let playInterval = null;
let selectedCorner = null;
let selectedDriver = null;
let winProbChart = null;
let lapTimeChart = null;
let cornerScoreChart = null;

// Track data — populated from GPS after analyze()
// Falls back to null (no track rendered) if OpenF1 unreachable
let TRACK_DATA = null;   // {path, points, corners, viewBox}

// GPS corner lookup built from TRACK_DATA.corners
let GPS_CORNER_POS = {};      // {T1: {x,y,lx,ly}, ...}

// ── ANALYZE ────────────────────────────────────────────────────────────────
async function analyze() {
  const year    = document.getElementById('sel-year').value;
  const circuit = document.getElementById('sel-circuit').value;
  const btn     = document.getElementById('analyze-btn');
  const dot     = document.getElementById('status-dot');

  btn.disabled = true;
  dot.className = 'dot loading';
  document.getElementById('loading-overlay').classList.add('show');
  setLoadingProgress(0, 'CONNECTING TO OPENF1...');

  let evtSource = null;
  try {
    evtSource = new EventSource('/api/progress');
    evtSource.onmessage = e => {
      const d = JSON.parse(e.data);
      setLoadingProgress(d.pct, d.message);
      if (d.status === 'done') { evtSource.close(); evtSource = null; }
    };
    evtSource.onerror = () => { if(evtSource){evtSource.close();evtSource=null;} };
  } catch(e){}

  try {
    // Step 1: fetch track GPS layout
    setLoadingProgress(3, 'FETCHING TRACK LAYOUT...');
    let trackData = null;
    try {
      const trackRes = await fetch(`/api/track?circuit=${circuit}&year=2024`);
      console.log('[track] status:', trackRes.status);
      if (trackRes.ok) {
        trackData = await trackRes.json();
        console.log('[track] data:', trackData ? `${trackData.points?.length} pts` : 'null');
      }
    } catch(te) {
      console.warn('[track] fetch failed:', te);
    }

    // Step 2: fetch race analysis (SSE progress already streaming)
    setLoadingProgress(5, 'LOADING RACE DATA...');
    const raceRes = await fetch(`/api/analyze?year=${year}&circuit=${circuit}`);
    if (!raceRes.ok) throw new Error(`HTTP ${raceRes.status}`);
    G = await raceRes.json();
    if (G.error) throw new Error(`OpenF1: ${G.error}`);
    G._track = trackData;

    currentLap = 0; selectedCorner = null; selectedDriver = null;
    setLoadingProgress(100, 'DONE');
    initUI();
    dot.className = 'dot live';
  } catch(e) {
    dot.className = 'dot';
    alert('Analysis failed — is Flask running?\n' + e.message);
  } finally {
    if (evtSource) evtSource.close();
    btn.disabled = false;
    document.getElementById('loading-overlay').classList.remove('show');
  }
}

function setLoadingProgress(pct, msg) {
  const fill = document.getElementById('loading-fill');
  const msgEl = document.getElementById('loading-msg');
  const txt   = document.getElementById('loading-text');
  if (fill)  fill.style.width = pct + '%';
  if (msgEl) msgEl.textContent = msg.toUpperCase();
  if (txt)   txt.textContent = pct < 100 ? `LOADING  ${pct}%` : 'COMPLETE';
}

// ── INIT ───────────────────────────────────────────────────────────────────
function initUI() {
  renderDriverList();
  renderTrackSVG();
  setupScrubber();
  renderWinProbChart();
  showImpactBadge();
  setLap(0);
}

function showImpactBadge() {
  const b = document.getElementById('impact-badge');
  b.style.display = 'block';
  b.innerHTML = `⚡ HIGHEST IMPACT CORNER: <b>${G.most_impactful_corner}</b>`;
}

// ── DRIVER LIST ────────────────────────────────────────────────────────────
function renderDriverList() {
  const list = document.getElementById('driver-list');
  list.innerHTML = '';
  G.final_ranking.forEach(r => {
    const d = G.drivers[r.driver];
    const pct = (r.win_probability * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'driver-row';
    row.id = `dr-${r.driver}`;
    row.style.setProperty('--driver-color', d.color);
    row.onclick = () => selectDriver(r.driver);
    row.innerHTML = `
      <div class="dr-swatch"></div>
      <div class="dr-info">
        <div class="dr-code">${r.driver}</div>
        <div class="dr-name">${d.name}</div>
      </div>
      <div class="dr-right">
        <div class="dr-prob" id="prob-${r.driver}">${pct}%</div>
        <div class="dr-pos" id="posdisp-${r.driver}">P—</div>
      </div>`;
    list.appendChild(row);
  });
}

// ── TRACK SVG ──────────────────────────────────────────────────────────────
function renderTrackSVG() {
  const wrap = document.getElementById('track-svg-wrap');
  TRACK_DATA = G._track;

  if (!TRACK_DATA || !TRACK_DATA.path) {
    wrap.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px">
      <div style="font-family:var(--hud);font-size:10px;letter-spacing:2px">TRACK LAYOUT UNAVAILABLE</div>
      <div style="font-family:var(--mono);font-size:9px;margin-top:8px">OpenF1 location API unreachable</div>
    </div>`;
    return;
  }

  // Build GPS corner lookup
  GPS_CORNER_POS = {};
  TRACK_DATA.corners.forEach(c => { GPS_CORNER_POS[c.name] = c; });

  // Build SVG
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox', TRACK_DATA.viewBox || '0 0 600 500');
  svg.style.cssText = 'max-width:88%;max-height:88%;filter:drop-shadow(0 0 30px rgba(0,212,255,.06))';

  svg.innerHTML = `
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path class="track-outline" d="${TRACK_DATA.path}"/>
    <path class="track-inner"   d="${TRACK_DATA.path}"/>
    <path class="track-center"  d="${TRACK_DATA.path}"/>
  `;

  const cg = makeSVGEl('g', {id:'corner-markers'});
  svg.appendChild(cg);

  // Corner markers from GPS positions
  G.corners.forEach(cn => {
    const pos = GPS_CORNER_POS[cn];
    if (!pos) return;
    const isImpact = cn === G.most_impactful_corner;
    const color = isImpact ? '#f5a623' : '#1e4060';

    const circle = makeSVGEl('circle',{cx:pos.x, cy:pos.y, r:6, fill:color,
      class:'corner-dot', id:`cdot-${cn}`});
    circle.style.setProperty('--c-color', color);
    circle.addEventListener('click', () => selectCorner(cn));

    const text = makeSVGEl('text',{x:pos.lx, y:pos.ly,
      'text-anchor':'middle', class:'corner-label', id:`clabel-${cn}`});
    text.textContent = cn;
    cg.appendChild(circle);
    cg.appendChild(text);
  });

  wrap.innerHTML = '';
  wrap.appendChild(svg);
}

function makeSVGEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── SCRUBBER ───────────────────────────────────────────────────────────────
function setupScrubber() {
  const slider = document.getElementById('lap-slider');
  slider.max   = G.bayesian_timeline.length - 1;
  slider.value = 0;
}

function onScrub(val) { if(playInterval) stopPlay(); setLap(parseInt(val)); }

function togglePlay() { playInterval ? stopPlay() : startPlay(); }

function startPlay() {
  const btn = document.getElementById('play-btn');
  btn.textContent = '⏸'; btn.classList.add('playing');
  const maxLap = G.bayesian_timeline.length - 1;
  if (currentLap >= maxLap) setLap(0);
  playInterval = setInterval(() => {
    if (currentLap >= maxLap) { stopPlay(); return; }
    setLap(currentLap + 1);
  }, 500);
}

function stopPlay() {
  clearInterval(playInterval); playInterval = null;
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶'; btn.classList.remove('playing');
}

function setLap(lapIdx) {
  currentLap = lapIdx;
  document.getElementById('lap-slider').value = lapIdx;
  const snap   = G.bayesian_timeline[lapIdx];
  const maxLap = G.bayesian_timeline.length;
  document.getElementById('lap-counter').textContent = `LAP ${snap.lap}`;
  document.getElementById('lap-label').textContent   = `LAP ${snap.lap} / ${maxLap}`;

  updateDriverList(snap, lapIdx);
  updateCornerDots(lapIdx);
  if (selectedCorner) updateInspector(selectedCorner, lapIdx);
  if (selectedDriver) updateDriverDetail(selectedDriver);
}

// ── DRIVER LIST UPDATE ─────────────────────────────────────────────────────
function updateDriverList(snap, lapIdx) {
  // Re-sort rows by current win probability
  const sorted = Object.keys(G.drivers)
    .map(d => ({code:d, prob:snap[d]||0}))
    .sort((a,b) => b.prob - a.prob);

  const list = document.getElementById('driver-list');
  sorted.forEach((r, rank) => {
    const el    = document.getElementById(`dr-${r.code}`);
    const prob  = document.getElementById(`prob-${r.code}`);
    const posEl = document.getElementById(`posdisp-${r.code}`);
    if (!el) return;
    if (prob) prob.textContent = (r.prob*100).toFixed(1)+'%';

    // Show current race position in left panel
    const pt  = G.drivers[r.code].pos_timeline && G.drivers[r.code].pos_timeline[lapIdx];
    const pos = pt ? pt.position : null;
    if (posEl) posEl.textContent = pos ? `P${pos}` : 'P—';

    // Re-order in DOM
    list.appendChild(el);
  });
}

// ── CORNER DOTS ───────────────────────────────────────────────────────────
function updateCornerDots(lapIdx) {
  G.corners.forEach(cn => {
    const dot = document.getElementById(`cdot-${cn}`);
    if (!dot) return;
    const winner = cornerWinnerAtLap(cn, lapIdx);
    const color  = winner ? G.drivers[winner].color : '#1e4060';
    dot.setAttribute('fill', color);
    dot.style.setProperty('--c-color', color);
  });
}

function cornerWinnerAtLap(cn, lapIdx) {
  let best = null, bestScore = -Infinity;
  Object.entries(G.drivers).forEach(([code, d]) => {
    if (lapIdx < d.laps.length) {
      const c = d.laps[lapIdx].corners.find(x => x.corner === cn);
      if (c && c.score > bestScore) { bestScore = c.score; best = code; }
    }
  });
  return best;
}

// ── CORNER INSPECTOR ──────────────────────────────────────────────────────
function selectCorner(cn) {
  if (selectedCorner) {
    document.getElementById(`cdot-${selectedCorner}`)?.classList.remove('active-corner');
    document.getElementById(`clabel-${selectedCorner}`)?.classList.remove('active-corner');
  }
  selectedCorner = cn;
  document.getElementById(`cdot-${cn}`)?.classList.add('active-corner');
  document.getElementById(`clabel-${cn}`)?.classList.add('active-corner');
  updateInspector(cn, currentLap);
  document.getElementById('corner-inspector').classList.add('show');
}

function updateInspector(cn, lapIdx) {
  document.getElementById('ci-title').textContent = cn;
  document.getElementById('ci-lap').textContent = `LAP ${G.bayesian_timeline[lapIdx]?.lap || '—'}`;
  const winner = cornerWinnerAtLap(cn, lapIdx);
  if (!winner) return;
  const d   = G.drivers[winner];
  const lap = d.laps[lapIdx];
  const c   = lap?.corners.find(x => x.corner === cn);
  document.getElementById('ci-winner-row').style.setProperty('--winner-color', d.color);
  document.getElementById('ci-winner-code').textContent = winner;
  document.getElementById('ci-winner-code').style.color = d.color;
  document.getElementById('ci-winner-name').textContent = d.name;
  if (c) {
    document.getElementById('ci-speed').textContent    = c.speed.toFixed(0);
    document.getElementById('ci-throttle').textContent = (c.throttle*100).toFixed(0)+'%';
    document.getElementById('ci-brake').textContent    = (c.brake*100).toFixed(0)+'%';
  }
}

function closeInspector() {
  document.getElementById('corner-inspector').classList.remove('show');
  selectedCorner = null;
  G.corners.forEach(cn => {
    document.getElementById(`clabel-${cn}`)?.classList.remove('active-corner');
    document.getElementById(`cdot-${cn}`)?.classList.remove('active-corner');
  });
}

// ── WIN PROB CHART ─────────────────────────────────────────────────────────
function renderWinProbChart() {
  const ctx = document.getElementById('chart-win-prob').getContext('2d');
  if (winProbChart) winProbChart.destroy();
  const tl       = G.bayesian_timeline;
  const labels   = tl.map(t => `L${t.lap}`);
  const topDrivers = G.final_ranking.slice(0,6);
  winProbChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets: topDrivers.map(r => ({
        label: r.driver,
        data:  tl.map(t => ((t[r.driver]||0)*100).toFixed(1)),
        borderColor: G.drivers[r.driver].color,
        backgroundColor:'transparent',
        borderWidth:1.5, pointRadius:0, tension:0.4,
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:true, animation:false,
      plugins:{
        legend:{display:true,labels:{color:'#4a6680',font:{family:'JetBrains Mono',size:8},boxWidth:8,padding:6}},
        tooltip:{backgroundColor:'#0a0f18',borderColor:'#1a2535',borderWidth:1,
          titleFont:{family:'JetBrains Mono',size:9},bodyFont:{family:'JetBrains Mono',size:9},
          titleColor:'#dce8f5',bodyColor:'#4a6680'}
      },
      scales:{
        x:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:8},maxTicksLimit:8},grid:{color:'#1a2535'}},
        y:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:8},callback:v=>v+'%'},grid:{color:'#1a2535'},min:0}
      }
    }
  });
}

// ── DRIVER DETAIL ──────────────────────────────────────────────────────────
function selectDriver(code) {
  selectedDriver = code;
  document.querySelectorAll('.driver-row').forEach(r => r.classList.remove('active'));
  document.getElementById(`dr-${code}`)?.classList.add('active');
  document.getElementById('driver-click-prompt').style.display = 'none';
  document.getElementById('driver-detail-panel').style.display = 'block';
  updateDriverDetail(code);
}

function updateDriverDetail(code) {
  const d        = G.drivers[code];
  const snap     = G.bayesian_timeline[currentLap];
  const winProb  = ((snap[code]||0)*100).toFixed(1);
  const pt       = d.pos_timeline && d.pos_timeline[currentLap];
  const pos      = pt ? pt.position : '—';
  const gap      = pt && pt.gap != null ? `+${pt.gap.toFixed(1)}s` : (pos===1?'LEADER':'—');
  const avgLt    = (d.laps.reduce((s,l)=>s+l.laptime,0)/d.laps.length).toFixed(3);
  const cWins    = G.corners.filter(cn => G.corner_winners[cn]===code).length;

  const panel = document.getElementById('driver-detail-panel');
  panel.className = 'fade-in';
  panel.innerHTML = `
    <div class="dd-header">
      <div class="dd-code" style="color:${d.color}">${code}</div>
      <div class="dd-name">${d.name}</div>
      <div class="dd-team">${d.team} · 2025 AVG POS: P${d.avg_finish_2025}</div>
    </div>
    <div class="dd-stats">
      <div class="dd-stat"><div class="dd-stat-val" style="color:${d.color}">${winProb}%</div><div class="dd-stat-label">WIN PROB</div></div>
      <div class="dd-stat"><div class="dd-stat-val" style="color:var(--cyan)">P${pos}</div><div class="dd-stat-label">POSITION</div></div>
      <div class="dd-stat"><div class="dd-stat-val" style="color:var(--amber)">${gap}</div><div class="dd-stat-label">GAP</div></div>
      <div class="dd-stat"><div class="dd-stat-val" style="color:var(--green)">${cWins}</div><div class="dd-stat-label">CORNER WINS</div></div>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">WIN PROBABILITY TREND</div>
    <canvas id="dd-prob-chart" class="chart-small"></canvas>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin:10px 0 6px">RACE POSITION TREND</div>
    <canvas id="dd-pos-chart" class="chart-small"></canvas>
    <div id="dd-advice-section"></div>
    <button class="btn btn-ghost" style="margin-top:12px;width:100%;font-size:10px" onclick="backToPrompt()">← BACK</button>
  `;

  // Render counterfactual advice for current lap
  renderAdvice(code, currentLap + 1);

  setTimeout(() => {
    // Win prob trend for this driver
    const tl  = G.bayesian_timeline;
    const ctx1 = document.getElementById('dd-prob-chart');
    if (ctx1) new Chart(ctx1.getContext('2d'), {
      type:'line',
      data:{labels:tl.map(t=>`L${t.lap}`),datasets:[{
        data:tl.map(t=>((t[code]||0)*100).toFixed(2)),
        borderColor:d.color,backgroundColor:d.color+'20',fill:true,tension:0.4,pointRadius:0,borderWidth:1.5,
      }]},
      options:miniOpts()
    });

    // Race position trend
    const pts  = d.pos_timeline || [];
    const ctx2 = document.getElementById('dd-pos-chart');
    if (ctx2) new Chart(ctx2.getContext('2d'), {
      type:'line',
      data:{labels:pts.map(p=>`L${p.lap}`),datasets:[{
        data:pts.map(p=>p.position||null),
        borderColor:d.color,backgroundColor:'transparent',tension:0.3,pointRadius:0,borderWidth:1.5,
      }]},
      options:{...miniOpts(), scales:{
        x:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:7},maxTicksLimit:6},grid:{color:'#1a2535'}},
        y:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:7},reverse:true,callback:v=>`P${v}`},grid:{color:'#1a2535'},min:1,max:20},
      }}
    });
  }, 30);
}

function renderAdvice(code, lapNum) {
  const section = document.getElementById('dd-advice-section');
  if (!section) return;
  const d      = G.drivers[code];
  const advice = d.advice && d.advice[String(lapNum)];

  if (!advice || advice.length === 0) {
    section.innerHTML = '';
    return;
  }

  const rows = advice.map((a, i) => {
    const isTop  = i === 0;
    const sign   = a.delta_p > 0 ? '+' : '';
    const color  = a.delta_p > 1.5 ? 'var(--green)' :
                   a.delta_p > 0.3 ? 'var(--amber)' : 'var(--muted)';
    const badge  = isTop ? `<span style="color:var(--cyan);font-size:8px;margin-left:4px">▲ TOP PRIORITY</span>` : '';
    return `
      <div style="
        padding:8px 10px;
        margin-bottom:5px;
        background:${isTop ? 'rgba(0,212,255,0.06)' : 'rgba(255,255,255,0.02)'};
        border:1px solid ${isTop ? 'rgba(0,212,255,0.2)' : 'rgba(255,255,255,0.05)'};
        border-radius:4px;
      ">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-family:var(--hud);font-size:9px;letter-spacing:1px;color:var(--fg)">${a.factor}</span>
          <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${color}">${sign}${a.delta_p.toFixed(2)}%</span>
        </div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">${a.intervention}${badge}</div>
      </div>`;
  }).join('');

  section.innerHTML = `
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin:12px 0 7px">
      STRATEGIC ADVICE — LAP ${lapNum}
    </div>
    ${rows}
    <div style="font-family:var(--mono);font-size:8px;color:#2a4050;margin-top:5px;line-height:1.4">
      ΔP = counterfactual gain in win probability if intervention applied this lap
    </div>
  `;
}

function backToPrompt() {
  selectedDriver = null;
  document.querySelectorAll('.driver-row').forEach(r => r.classList.remove('active'));
  document.getElementById('driver-detail-panel').style.display = 'none';
  document.getElementById('driver-click-prompt').style.display = 'block';
}

function miniOpts() {
  return {
    responsive:true, maintainAspectRatio:true, animation:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a0f18',borderColor:'#1a2535',borderWidth:1,
      titleFont:{family:'JetBrains Mono',size:8},bodyFont:{family:'JetBrains Mono',size:8},
      titleColor:'#dce8f5',bodyColor:'#4a6680'}},
    scales:{
      x:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:7},maxTicksLimit:6},grid:{color:'#1a2535'}},
      y:{ticks:{color:'#4a6680',font:{family:'JetBrains Mono',size:7},maxTicksLimit:4},grid:{color:'#1a2535'}},
    }
  };
}
</script>

</html>
