<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Probability Intelligence System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #080c12;
    --surface:   #0d1520;
    --surface2:  #111e2e;
    --border:    #1e3348;
    --accent:    #e10600;
    --accent2:   #ff6b35;
    --text:      #e8edf3;
    --muted:     #5a7a9a;
    --green:     #00d46a;
    --yellow:    #ffd600;
    --font-hud:  'Orbitron', monospace;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(30,51,72,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,51,72,0.2) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(13,21,32,0.98) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    clip-path: polygon(0 20%, 60% 0, 100% 50%, 60% 100%, 0 80%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-hud);
    font-size: 11px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
    animation: pulse-icon 2s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .logo-text {
    font-family: var(--font-hud);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text);
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  select, button {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  select:hover, select:focus { border-color: var(--accent); outline: none; }

  .run-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 9px 22px;
    border-radius: 3px;
    transition: background 0.2s, transform 0.1s;
  }

  .run-btn:hover { background: #c00500; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.loading { background: var(--yellow); animation: blink 0.7s infinite; }
  .status-dot.ready   { background: var(--green); }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    min-height: calc(100vh - 74px);
  }

  /* ── OVERVIEW STRIP ── */
  #overview-strip {
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    background: rgba(13,21,32,0.6);
    min-height: 110px;
    align-items: center;
  }

  .overview-card {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    width: 160px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .overview-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--driver-color, var(--muted));
    border-radius: 6px 0 0 6px;
  }

  .overview-card:hover { border-color: var(--driver-color, var(--border)); transform: translateY(-2px); }
  .overview-card.active { border-color: var(--driver-color, var(--accent)); background: var(--surface2); }

  .ov-code {
    font-family: var(--font-hud);
    font-size: 18px;
    font-weight: 700;
    color: var(--driver-color, var(--text));
  }

  .ov-name {
    font-size: 10px;
    color: var(--muted);
    margin: 2px 0 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ov-prob {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }

  .ov-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; }

  .prob-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .prob-bar-fill {
    height: 100%;
    background: var(--driver-color, var(--accent));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    width: 0%;
  }

  /* ── DRIVER SIDEBAR ── */
  #driver-sidebar {
    border-right: 1px solid var(--border);
    background: rgba(13,21,32,0.5);
    padding: 20px 0;
    overflow-y: auto;
  }

  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 0 20px 10px;
  }

  .driver-tab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .driver-tab:hover { background: rgba(255,255,255,0.03); }
  .driver-tab.active {
    background: var(--surface2);
    border-left-color: var(--driver-color, var(--accent));
  }

  .dt-swatch {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--driver-color, var(--muted));
    flex-shrink: 0;
  }

  .dt-info { flex: 1; min-width: 0; }

  .dt-code {
    font-family: var(--font-hud);
    font-size: 13px;
    font-weight: 700;
  }

  .dt-name {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dt-prob {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  /* ── CONTENT AREA ── */
  #content {
    overflow-y: auto;
    padding: 28px 36px;
    background: transparent;
  }

  /* ── PLACEHOLDER ── */
  #placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }

  .placeholder-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .placeholder-title {
    font-family: var(--font-hud);
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* ── DRIVER DETAIL ── */
  .driver-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .dh-code {
    font-family: var(--font-hud);
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
    color: var(--driver-color, var(--text));
  }

  .dh-name {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .dh-stats {
    margin-left: auto;
    display: flex;
    gap: 24px;
  }

  .stat-box {
    text-align: right;
  }

  .stat-val {
    font-family: var(--font-hud);
    font-size: 22px;
    font-weight: 700;
    color: var(--driver-color, var(--accent));
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── SECTION HEADERS ── */
  .section-hd {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-hd::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── CHARTS GRID ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }

  .chart-card.wide {
    grid-column: 1 / -1;
  }

  .chart-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  canvas { max-height: 220px; }

  /* ── CORNER TABLE ── */
  .corner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }

  .corner-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }

  .corner-cell.winner {
    border-color: var(--driver-color, var(--green));
  }

  .corner-cell.winner::after {
    content: '▲ BEST';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 7px;
    letter-spacing: 1px;
    color: var(--driver-color, var(--green));
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .cc-name {
    font-family: var(--font-hud);
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .cc-score {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
  }

  .cc-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
  }

  .cc-bar-fill {
    height: 100%;
    border-radius: 1px;
    background: var(--driver-color, var(--muted));
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }

  /* ── RACE TIMELINE CHART ── */
  #race-section {
    margin-bottom: 28px;
  }

  /* ── FORMULA BOX ── */
  .formula-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 6px;
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.8;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .formula-box b { color: var(--text); }
  .formula-box .math { color: var(--accent2); font-style: italic; }

  /* ── RANKINGS PANEL ── */
  .rankings-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .rank-row:hover { border-color: var(--driver-color, var(--border)); }

  .rank-pos {
    font-family: var(--font-hud);
    font-size: 18px;
    font-weight: 700;
    width: 28px;
    text-align: center;
    color: var(--muted);
  }

  .rank-pos.p1 { color: var(--yellow); }
  .rank-pos.p2 { color: #b0b8c8; }
  .rank-pos.p3 { color: #cd7f32; }

  .rank-name { flex: 1; font-size: 14px; }
  .rank-code { font-family: var(--font-hud); font-size: 12px; color: var(--muted); width: 40px; }

  .rank-prob {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--green);
    width: 60px;
    text-align: right;
  }

  .rank-bar-wrap { width: 120px; }

  /* ── LOADING OVERLAY ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,12,18,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  #loading.show { display: flex; }

  .loading-hud {
    font-family: var(--font-hud);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    animation: blink 1s infinite;
  }

  .loading-bar-wrap {
    width: 300px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    animation: loading-anim 1.5s ease-in-out infinite;
  }

  @keyframes loading-anim {
    0%   { width: 0%; margin-left: 0%; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── SOLAR CAR BADGE ── */
  .solar-badge {
    background: linear-gradient(135deg, #ff6b35, #ffd600);
    color: #080c12;
    font-family: var(--font-hud);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── FADE-IN ANIMATION ── */
  .fade-in {
    animation: fadeIn 0.35s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-hud">COMPUTING PROBABILISTIC MODEL</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">F1</div>
    <div>
      <div class="logo-text">PROBABILITY INTELLIGENCE SYSTEM</div>
      <div class="logo-sub">CS109 · BAYESIAN TELEMETRY ANALYSIS</div>
    </div>
  </div>
  <div class="header-controls">
    <select id="sel-year">
      <option value="2026">2026 SEASON</option>
      <option value="2025">2025 SEASON</option>
      <option value="2024">2024 SEASON</option>
      <option value="2023">2023 SEASON</option>
    </select>
    <select id="sel-circuit">
      <option value="Australia">AUSTRALIA GP</option>
      <option value="China">CHINA GP</option>
      <option value="Bahrain">BAHRAIN GP</option>
      <option value="Saudi Arabia">SAUDI ARABIA GP</option>
      <option value="Japan">JAPAN GP</option>
      <option value="Monaco">MONACO GP</option>
      <option value="Silverstone">SILVERSTONE GP</option>
      <option value="Monza">MONZA GP</option>
    </select>
    <div class="status-dot" id="status-dot"></div>
    <button class="run-btn" id="run-btn" onclick="runAnalysis()">▶ ANALYZE</button>
  </div>
</header>

<main>
  <!-- OVERVIEW STRIP -->
  <div id="overview-strip">
    <div style="font-family:var(--font-hud);font-size:11px;letter-spacing:2px;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);flex-shrink:0">
      WIN PROB
    </div>
    <div id="overview-cards" style="display:flex;gap:12px;"></div>
  </div>

  <!-- SIDEBAR -->
  <aside id="driver-sidebar">
    <div class="sidebar-label">DRIVERS</div>
    <div id="driver-tabs"></div>
  </aside>

  <!-- CONTENT -->
  <section id="content">
    <div id="placeholder">
      <div class="placeholder-icon">🏎</div>
      <div class="placeholder-title">SELECT A CIRCUIT AND ANALYZE</div>
      <div style="font-size:12px;color:var(--muted);max-width:300px;line-height:1.6">
        Gaussian MLE · Naive Bayes · Bayesian Inference<br>
        Powered by FastF1 telemetry
      </div>
    </div>
    <div id="driver-detail" style="display:none"></div>
    <div id="race-overview" style="display:none"></div>
  </section>
</main>

<script>
let globalData = null;
let activeDriver = null;
const chartInstances = {};

// ── COLOR UTILS ────────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── RUN ANALYSIS ───────────────────────────────────────────────────────────
async function runAnalysis() {
  const year    = document.getElementById('sel-year').value;
  const circuit = document.getElementById('sel-circuit').value;
  const btn     = document.getElementById('run-btn');
  const dot     = document.getElementById('status-dot');

  btn.disabled = true;
  dot.className = 'status-dot loading';
  document.getElementById('loading').classList.add('show');

  try {
    const res = await fetch(`/api/run?year=${year}&circuit=${circuit}`);
    globalData = await res.json();
    renderAll();
    dot.className = 'status-dot ready';
  } catch(e) {
    console.error(e);
    dot.className = 'status-dot';
    alert('Analysis failed. Is the Flask server running?');
  } finally {
    btn.disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

// ── RENDER ALL ─────────────────────────────────────────────────────────────
function renderAll() {
  renderOverviewCards();
  renderDriverTabs();
  // Default: show race overview
  showRaceOverview();
}

// ── OVERVIEW CARDS ─────────────────────────────────────────────────────────
function renderOverviewCards() {
  const container = document.getElementById('overview-cards');
  container.innerHTML = '';

  const ranking = globalData.final_ranking;

  ranking.forEach((r, idx) => {
    const d = globalData.drivers[r.driver];
    if (!d) return;
    const pct = (r.win_probability * 100).toFixed(1);

    const card = document.createElement('div');
    card.className = 'overview-card';
    card.style.setProperty('--driver-color', d.team_color);
    card.onclick = () => selectDriver(r.driver);

    card.innerHTML = `
      <div class="ov-code">${r.driver}</div>
      <div class="ov-name">${d.name}</div>
      <div class="ov-prob">${pct}%</div>
      <div class="ov-label">WIN PROBABILITY</div>
      <div class="prob-bar"><div class="prob-bar-fill" style="width:${pct}%;background:${d.team_color}"></div></div>
    `;

    container.appendChild(card);
  });
}

// ── DRIVER SIDEBAR TABS ────────────────────────────────────────────────────
function renderDriverTabs() {
  const container = document.getElementById('driver-tabs');
  container.innerHTML = '';

  const ranking = globalData.final_ranking;

  ranking.forEach(r => {
    const d = globalData.drivers[r.driver];
    if (!d) return;
    const pct = (r.win_probability * 100).toFixed(1);

    const tab = document.createElement('div');
    tab.className = 'driver-tab';
    tab.id = `tab-${r.driver}`;
    tab.style.setProperty('--driver-color', d.team_color);
    tab.onclick = () => selectDriver(r.driver);

    tab.innerHTML = `
      <div class="dt-swatch"></div>
      <div class="dt-info">
        <div class="dt-code">${r.driver}</div>
        <div class="dt-name">${d.name}</div>
      </div>
      <div class="dt-prob">${pct}%</div>
    `;

    container.appendChild(tab);
  });

  // Also add "Race Overview" tab at top
  const ovTab = document.createElement('div');
  ovTab.className = 'driver-tab';
  ovTab.id = 'tab-overview';
  ovTab.onclick = showRaceOverview;
  ovTab.innerHTML = `
    <div class="dt-swatch" style="background:#5a7a9a"></div>
    <div class="dt-info">
      <div class="dt-code" style="font-size:10px;letter-spacing:1px">RACE</div>
      <div class="dt-name">Full Overview</div>
    </div>
  `;
  container.prepend(ovTab);
}

// ── SELECT DRIVER ──────────────────────────────────────────────────────────
function selectDriver(code) {
  activeDriver = code;

  // Update sidebar active state
  document.querySelectorAll('.driver-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById(`tab-${code}`);
  if (tab) tab.classList.add('active');

  // Update overview cards
  document.querySelectorAll('.overview-card').forEach(c => c.classList.remove('active'));

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('race-overview').style.display = 'none';
  document.getElementById('driver-detail').style.display = 'block';

  renderDriverDetail(code);
}

// ── DRIVER DETAIL ──────────────────────────────────────────────────────────
function renderDriverDetail(code) {
  const d = globalData.drivers[code];
  const color = d.team_color;
  const finalRank = globalData.final_ranking.findIndex(r => r.driver === code) + 1;
  const finalProb = (d.stage3.final_win_prob * 100).toFixed(1);
  const stage2Prob = (d.stage2.race_win_prob * 100).toFixed(1);
  const s1Score = d.stage1.overall_score.toFixed(2);

  const container = document.getElementById('driver-detail');
  container.className = 'fade-in';

  // Check corner wins
  const cornerWins = globalData.corners.filter(cn => globalData.corner_winners[cn] === code);

  container.innerHTML = `
    <div class="driver-header">
      <div>
        <div class="dh-code" style="color:${color}">${code}</div>
        <div class="dh-name">${d.name}</div>
      </div>
      <div class="dh-stats">
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${finalProb}%</div>
          <div class="stat-label">BAYESIAN WIN PROB</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${stage2Prob}%</div>
          <div class="stat-label">NAIVE BAYES PROB</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${s1Score}</div>
          <div class="stat-label">GAUSSIAN SCORE</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${cornerWins.length}/${globalData.corners.length}</div>
          <div class="stat-label">CORNER WINS</div>
        </div>
      </div>
    </div>

    <!-- STAGE 1 -->
    <div class="section-hd">STAGE 1 — GAUSSIAN MLE CORNER ANALYSIS</div>
    <div class="formula-box">
      <b>Model:</b> speed, throttle, brake per corner ~ <span class="math">N(μ, σ²)</span><br>
      <b>MLE estimates:</b> <span class="math">μ̂ = (1/n)Σxᵢ</span> &nbsp;|&nbsp; <span class="math">σ̂² = (1/n)Σ(xᵢ−μ̂)²</span><br>
      <b>Score:</b> log P(x | optimal Gaussian) — higher = closer to optimal corner execution
    </div>
    <div class="corner-grid" id="corner-grid-${code}"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">LAP SCORE OVER TIME (Stage 1 log-likelihood)</div>
        <canvas id="chart-lap-${code}"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">TOP CORNER EXECUTION SCORES</div>
        <canvas id="chart-corner-${code}"></canvas>
      </div>
    </div>

    <!-- STAGE 2 -->
    <div class="section-hd">STAGE 2 — NAIVE BAYES LAP CLASSIFIER</div>
    <div class="formula-box">
      <b>Model:</b> <span class="math">P(winner | x₁,…,xₙ) ∝ P(winner) · ∏ᵢ P(xᵢ | winner)</span><br>
      <b>Each feature</b> xᵢ (corner score) ~ <span class="math">N(μᵢ_class, σᵢ_class²)</span> &nbsp;|&nbsp; <b>Prior:</b> <span class="math">P(winner) = 1/n_drivers</span><br>
      Training: top 15% of laps across field = "winner class"
    </div>
    <div class="chart-card" style="margin-bottom:28px">
      <div class="chart-title">P(WINNER) PER LAP — NAIVE BAYES</div>
      <canvas id="chart-nb-${code}" style="max-height:180px"></canvas>
    </div>

    <!-- STAGE 3 -->
    <div class="section-hd">STAGE 3 — BAYESIAN POSTERIOR UPDATE</div>
    <div class="formula-box">
      <b>Update rule:</b> <span class="math">P(winner=i | lap_k) ∝ P(lap_k | winner=i) · P(winner=i | lap_{k-1})</span><br>
      <b>Prior:</b> Stage 2 race-level probabilities &nbsp;|&nbsp; <b>Likelihood:</b> smoothed Stage 2 lap scores<br>
      Posterior converges as laps accumulate — live race prediction
    </div>
    <div class="chart-card" style="margin-bottom:28px">
      <div class="chart-title">BAYESIAN WIN PROBABILITY OVER RACE</div>
      <canvas id="chart-bayes-${code}" style="max-height:200px"></canvas>
    </div>
  `;

  // Render corner grid
  renderCornerGrid(code, color);

  // Render charts (use setTimeout to ensure DOM is ready)
  setTimeout(() => {
    renderLapScoreChart(code, color);
    renderCornerBarChart(code, color);
    renderNBChart(code, color);
    renderBayesChart(code, color);
  }, 50);
}

// ── CORNER GRID ────────────────────────────────────────────────────────────
function renderCornerGrid(code, color) {
  const grid = document.getElementById(`corner-grid-${code}`);
  if (!grid) return;

  const d = globalData.drivers[code];
  const cornerScores = d.stage1.corner_scores;
  const allScores = Object.values(cornerScores);
  const maxScore = Math.max(...allScores);
  const minScore = Math.min(...allScores);

  globalData.corners.forEach(cn => {
    const score = cornerScores[cn] ?? 0;
    const norm = maxScore !== minScore ? (score - minScore) / (maxScore - minScore) : 0.5;
    const isWinner = globalData.corner_winners[cn] === code;

    const cell = document.createElement('div');
    cell.className = `corner-cell${isWinner ? ' winner' : ''}`;
    cell.style.setProperty('--driver-color', color);

    cell.innerHTML = `
      <div class="cc-name">${cn}</div>
      <div class="cc-score">${score.toFixed(2)}</div>
      <div class="cc-bar"><div class="cc-bar-fill" style="width:${(norm*100).toFixed(1)}%;background:${isWinner ? color : 'var(--muted)'}"></div></div>
    `;

    grid.appendChild(cell);
  });
}

// ── LAP SCORE CHART ────────────────────────────────────────────────────────
function renderLapScoreChart(code, color) {
  destroyChart(`chart-lap-${code}`);
  const d = globalData.drivers[code];
  const laps = d.stage1.lap_scores;

  new Chart(document.getElementById(`chart-lap-${code}`), {
    type: 'line',
    data: {
      labels: laps.map(l => `L${l.lap}`),
      datasets: [{
        data: laps.map(l => l.score),
        borderColor: color,
        backgroundColor: hexToRgba(color, 0.08),
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2,
      }]
    },
    options: chartDefaults(`Stage 1 log-likelihood`)
  });
}

// ── CORNER BAR CHART ───────────────────────────────────────────────────────
function renderCornerBarChart(code, color) {
  destroyChart(`chart-corner-${code}`);
  const d = globalData.drivers[code];
  const scores = d.stage1.corner_scores;
  const corners = Object.keys(scores).slice(0, 10);
  const vals = corners.map(c => scores[c]);

  new Chart(document.getElementById(`chart-corner-${code}`), {
    type: 'bar',
    data: {
      labels: corners,
      datasets: [{
        data: vals,
        backgroundColor: corners.map(c =>
          globalData.corner_winners[c] === code
            ? hexToRgba(color, 0.8)
            : hexToRgba(color, 0.25)
        ),
        borderColor: corners.map(c =>
          globalData.corner_winners[c] === code ? color : 'transparent'
        ),
        borderWidth: 1,
      }]
    },
    options: chartDefaults('log-likelihood score')
  });
}

// ── NB CHART ───────────────────────────────────────────────────────────────
function renderNBChart(code, color) {
  destroyChart(`chart-nb-${code}`);
  const d = globalData.drivers[code];
  const laps = d.stage2.lap_scores;

  new Chart(document.getElementById(`chart-nb-${code}`), {
    type: 'line',
    data: {
      labels: laps.map(l => `L${l.lap}`),
      datasets: [{
        label: 'P(winner)',
        data: laps.map(l => (l.p_winner * 100).toFixed(2)),
        borderColor: color,
        backgroundColor: hexToRgba(color, 0.1),
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2,
      }]
    },
    options: {
      ...chartDefaults('P(winner) %'),
      scales: {
        ...chartDefaults('P(winner) %').scales,
        y: { ...chartDefaults('%').scales?.y, min: 0, max: 100,
          ticks: { color: '#5a7a9a', font: { family: 'IBM Plex Mono', size: 10 },
            callback: v => v + '%' },
          grid: { color: 'rgba(30,51,72,0.5)' } }
      }
    }
  });
}

// ── BAYESIAN CHART ─────────────────────────────────────────────────────────
function renderBayesChart(code, color) {
  destroyChart(`chart-bayes-${code}`);
  const timeline = globalData.bayesian_timeline;
  const laps = timeline.map(t => t.lap);
  const myProbs = timeline.map(t => ((t[code] || 0) * 100).toFixed(2));

  // Also plot top 3 other drivers faintly
  const otherDrivers = globalData.final_ranking
    .filter(r => r.driver !== code)
    .slice(0, 3);

  const datasets = [
    {
      label: code,
      data: myProbs,
      borderColor: color,
      backgroundColor: hexToRgba(color, 0.12),
      fill: true,
      tension: 0.4,
      borderWidth: 2.5,
      pointRadius: 2,
    },
    ...otherDrivers.map(r => ({
      label: r.driver,
      data: timeline.map(t => ((t[r.driver] || 0) * 100).toFixed(2)),
      borderColor: hexToRgba(globalData.drivers[r.driver]?.team_color || '#5a7a9a', 0.5),
      fill: false,
      tension: 0.4,
      borderWidth: 1,
      pointRadius: 0,
      borderDash: [4, 4],
    }))
  ];

  new Chart(document.getElementById(`chart-bayes-${code}`), {
    type: 'line',
    data: { labels: laps.map(l => `L${l}`), datasets },
    options: {
      ...chartDefaults('Win prob %'),
      plugins: {
        legend: { display: true, labels: { color: '#5a7a9a',
          font: { family: 'IBM Plex Mono', size: 9 }, boxWidth: 12 } }
      }
    }
  });
}

// ── RACE OVERVIEW ──────────────────────────────────────────────────────────
function showRaceOverview() {
  if (!globalData) return;
  activeDriver = null;
  document.querySelectorAll('.driver-tab').forEach(t => t.classList.remove('active'));
  const ovTab = document.getElementById('tab-overview');
  if (ovTab) ovTab.classList.add('active');

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('driver-detail').style.display = 'none';
  const ov = document.getElementById('race-overview');
  ov.style.display = 'block';
  ov.className = 'fade-in';

  const circuit = globalData.circuit;

  ov.innerHTML = `
    <div style="margin-bottom:28px">
      <div style="font-family:var(--font-hud);font-size:32px;font-weight:900;color:var(--accent)">${circuit.toUpperCase()} GP</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${globalData.year} · Probabilistic Race Intelligence</div>
    </div>

    <div class="section-hd">FINAL RANKINGS — BAYESIAN POSTERIOR <span class="solar-badge">SOLAR CAR READY</span></div>
    <div class="rankings-list" id="rankings-list"></div>

    <div class="section-hd">CORNER WINNERS — GAUSSIAN MLE (STAGE 1)</div>
    <div class="corner-grid" id="corner-winners-grid"></div>

    <div class="section-hd">RACE WIN PROBABILITY TIMELINE — ALL DRIVERS</div>
    <div class="chart-card wide" style="margin-bottom:28px">
      <div class="chart-title">BAYESIAN POSTERIOR P(WIN) OVER LAPS</div>
      <canvas id="chart-race-timeline" style="max-height:280px"></canvas>
    </div>
  `;

  renderRankingsList();
  renderCornerWinnersOverview();
  setTimeout(renderRaceTimeline, 50);
}

function renderRankingsList() {
  const list = document.getElementById('rankings-list');
  globalData.final_ranking.forEach((r, idx) => {
    const d = globalData.drivers[r.driver];
    if (!d) return;
    const posClass = idx === 0 ? 'p1' : idx === 1 ? 'p2' : idx === 2 ? 'p3' : '';
    const pct = (r.win_probability * 100).toFixed(1);

    const row = document.createElement('div');
    row.className = 'rank-row';
    row.style.setProperty('--driver-color', d.team_color);
    row.onclick = () => selectDriver(r.driver);

    row.innerHTML = `
      <div class="rank-pos ${posClass}">${idx + 1}</div>
      <div class="dt-swatch" style="background:${d.team_color}"></div>
      <div class="rank-name">${d.name}</div>
      <div class="rank-code">${r.driver}</div>
      <div class="rank-bar-wrap">
        <div class="prob-bar"><div class="prob-bar-fill" style="width:${pct}%;background:${d.team_color}"></div></div>
      </div>
      <div class="rank-prob">${pct}%</div>
    `;
    list.appendChild(row);
  });
}

function renderCornerWinnersOverview() {
  const grid = document.getElementById('corner-winners-grid');
  globalData.corners.forEach(cn => {
    const winnerCode = globalData.corner_winners[cn];
    const d = globalData.drivers[winnerCode];
    if (!d) return;

    const cell = document.createElement('div');
    cell.className = 'corner-cell winner';
    cell.style.setProperty('--driver-color', d.team_color);
    cell.onclick = () => selectDriver(winnerCode);

    const score = d.stage1.corner_scores[cn];
    cell.innerHTML = `
      <div class="cc-name">${cn}</div>
      <div style="font-family:var(--font-hud);font-size:13px;color:${d.team_color};margin:4px 0">${winnerCode}</div>
      <div style="font-size:10px;color:var(--muted)">${score ? score.toFixed(2) : '—'}</div>
    `;
    grid.appendChild(cell);
  });
}

function renderRaceTimeline() {
  destroyChart('chart-race-timeline');
  const timeline = globalData.bayesian_timeline;
  const laps = timeline.map(t => `L${t.lap}`);

  const datasets = globalData.final_ranking.slice(0, 6).map(r => {
    const d = globalData.drivers[r.driver];
    return {
      label: r.driver,
      data: timeline.map(t => ((t[r.driver] || 0) * 100).toFixed(2)),
      borderColor: d?.team_color || '#5a7a9a',
      backgroundColor: 'transparent',
      fill: false,
      tension: 0.4,
      borderWidth: 2,
      pointRadius: 0,
    };
  });

  new Chart(document.getElementById('chart-race-timeline'), {
    type: 'line',
    data: { labels: laps, datasets },
    options: {
      ...chartDefaults('Win prob %'),
      plugins: {
        legend: {
          display: true,
          labels: { color: '#5a7a9a', font: { family: 'IBM Plex Mono', size: 9 }, boxWidth: 12 }
        }
      }
    }
  });
}

// ── CHART DEFAULTS ─────────────────────────────────────────────────────────
function chartDefaults(yLabel = '') {
  return {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#0d1520',
        borderColor: '#1e3348',
        borderWidth: 1,
        titleColor: '#e8edf3',
        bodyColor: '#5a7a9a',
        titleFont: { family: 'IBM Plex Mono', size: 11 },
        bodyFont: { family: 'IBM Plex Mono', size: 10 },
      }
    },
    scales: {
      x: {
        ticks: { color: '#5a7a9a', font: { family: 'IBM Plex Mono', size: 9 }, maxTicksLimit: 10 },
        grid: { color: 'rgba(30,51,72,0.4)' }
      },
      y: {
        ticks: { color: '#5a7a9a', font: { family: 'IBM Plex Mono', size: 10 } },
        grid: { color: 'rgba(30,51,72,0.5)' }
      }
    }
  };
}

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
  // Also use Chart.js registry
  const existing = Chart.getChart(id);
  if (existing) existing.destroy();
}
</script>
